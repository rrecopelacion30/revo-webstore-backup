<script>
    // START MAR-3294 - Update Vehicle pages on Nissan USA to include H1 titles and Breadcrumb Links
    function toggleSectionByVehicleYear() {
        const path = window.location.pathname;
        const vehicleSegment = path.split('/').find(segment => segment.startsWith('v-'));

        if (vehicleSegment) {
            const parts = vehicleSegment.replace('v-', '').split('-');

            const hasYear = /^\d{4}$/.test(parts[0]);

            if (hasYear) {
                document.body.classList.add('has-year');
                document.body.classList.remove('no-year');
            } else {
                document.body.classList.add('no-year');
                document.body.classList.remove('has-year');
            }
        }
    }
    toggleSectionByVehicleYear();

    let currentYear = new Date().getFullYear();
    $('.themeFooterBottomEnd .listRight .links-list li').html(`© ${currentYear} Nissan North America, Inc.`);

  $('.tooltip-anchor').on('click', function (e) {
    e.preventDefault();

    const anchor = $(this);
    const wrapper = anchor.closest('.custom-tooltip-wrapper');
    const tooltip = wrapper.find('.custom-tooltip');

    // Hide all tooltips first
    $('.custom-tooltip').hide();

    const anchorOffset = anchor.offset();
    const anchorWidth = anchor.outerWidth();
    const anchorCenter = anchorOffset.left + anchorWidth / 2;

    const tooltipWidth = tooltip.outerWidth();
    const windowWidth = $(window).width();

    // Reset styles
    tooltip.css({ left: '', right: '', transform: '' });

    let top = anchor.position().top + anchor.outerHeight() + 8;

    if (anchorCenter < tooltipWidth / 2) {
      // Left edge case
      tooltip.css({
        left: '0',
        right: 'auto',
        top: top + 'px'
      });
    } else if (windowWidth - anchorCenter < tooltipWidth / 2) {
      // Right edge case
      tooltip.css({
        right: '0',
        left: 'auto',
        top: top + 'px'
      });
    } else {
      // Centered
      const tooltipLeft = anchor.position().left + anchorWidth / 2 - tooltipWidth / 2;
      tooltip.css({
        left: tooltipLeft + 'px',
        top: top + 'px'
      });
    }

    tooltip.show();
  });

  // Hide tooltip on outside click
  $(document).on('click', function (e) {
    if (!$(e.target).closest('.tooltip-anchor, .custom-tooltip').length) {
      $('.custom-tooltip').hide();
    }
  });
});
    
</script>

(function() {
    // Function to handle URL parameter conversion
    function convertPromoParameter() {
        
        // Get current URL parameters
        const urlParams = new URLSearchParams(window.location.search);

        // Check if the "promo" parameter exists and not already "promocode"
        if (urlParams.has("promo") && !urlParams.has("promocode")) {
            // Get the value from the "promo" parameter
            const promoValue = urlParams.get("promo");

            // Update parameters: remove "promo" and add "promocode"
            urlParams.delete("promo");
            urlParams.set("promocode", promoValue);
            
            // Build the new URL with updated parameters
            const newUrl = window.location.origin + window.location.pathname + "?" + urlParams.toString();
            
            // Preserve hash if present
            if (window.location.hash) {
                newUrl += window.location.hash;
            }

            
            // Redirect to the new URL
            window.location.href = newUrl; // Using href instead of replace for better compatibility
        } 
    }

    // Try to run immediately
    convertPromoParameter();
    
    // Also run when DOM is loaded as fallback
    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", convertPromoParameter);
    }
    
    // Final fallback - run after window loads completely
    window.addEventListener("load", function() {
        const urlParams = new URLSearchParams(window.location.search);
        if (!urlParams.has("promocode")) {
            convertPromoParameter();
        }
    });
})();

        'page-catalog',
        'page-categories-parts',
        'page-category-listing-page',
        'page-subcategory-listing-page',
        'page-vehicle-picker-category',
        'page-oem-assemblies',
      ]);

      const mainId = $('body > .main').attr('id');
      return allowedIds.has(mainId);
    }

    let stylesheetCleanupDone = false;

    function openFacetAccordions(retries = 10) {
      if (!isNewSearchPage()) {
        return false;
      }
      const wrappers = $('.search-facets-module.search-based-v-page .facet-wrapper');
      const contents = $('.search-facets-module.search-based-v-page .facet-wrapper .facet-content');

      if (wrappers.length > 0) {
        wrappers.attr('data-collapsed', false);
        contents.removeAttr('hidden');
      } else if (retries > 0) {
        return setTimeout(() => openFacetAccordions(retries - 1), 300);
      }

      if (!stylesheetCleanupDone) {
        stylesheetCleanupDone = true;

        const stylesheets = Array.from(document.styleSheets);

        for (let sheet of stylesheets) {
          try {
            const rules = sheet.cssRules || sheet.rules;
            for (let i = rules.length - 1; i >= 0; i--) {
              const rule = rules[i];

              if (
                rule.selectorText &&
                rule.selectorText.includes('.search-based-v-page') &&
                rule.selectorText.includes('.facet-content[hidden]') &&
                rule.selectorText.includes('.search-facets-module') &&
                rule.style &&
                rule.style.display === 'none'
              ) {
                sheet.deleteRule(i);
              }
            }
          } catch (e) {
            continue;
          }
        }
      }
    }

    setTimeout(() => openFacetAccordions(), 100);

    // END NEW SEARCH UI SCRIPTS
    
});
